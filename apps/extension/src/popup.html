<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SE稼働管理</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1e293b;
      background: #f8fafc;
    }

    .header {
      background: #1e2235;
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 14px; font-weight: 600; letter-spacing: -0.3px; }
    .header .user { font-size: 11px; color: #94a3b8; }

    .section { padding: 12px 16px; }

    /* タイマー */
    .timer-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 16px;
      margin: 12px 16px;
    }
    .elapsed {
      font-size: 36px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -1px;
      color: #6366f1;
      text-align: center;
      padding: 8px 0;
    }
    .elapsed.stopped { color: #94a3b8; }
    .timer-meta { text-align: center; font-size: 11px; color: #64748b; margin-bottom: 12px; }

    /* ログインフォーム */
    .login-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 16px;
      margin: 12px 16px;
    }
    .login-title { font-weight: 600; margin-bottom: 12px; }

    /* フォーム要素 */
    label { display: block; font-size: 11px; font-weight: 500; color: #64748b; margin-bottom: 4px; }
    input, select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 8px;
      background: white;
      color: #1e293b;
      outline: none;
    }
    input:focus, select:focus { border-color: #6366f1; box-shadow: 0 0 0 2px #6366f120; }

    /* ボタン */
    .btn {
      width: 100%;
      padding: 8px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover:not(:disabled) { background: #4f46e5; }
    .btn-danger  { background: #ef4444; color: white; }
    .btn-danger:hover:not(:disabled) { background: #dc2626; }
    .btn-ghost   { background: transparent; color: #64748b; border: 1px solid #e2e8f0; }
    .btn-ghost:hover:not(:disabled) { background: #f1f5f9; }

    /* サマリー */
    .summary {
      display: flex;
      gap: 8px;
      margin: 0 16px 12px;
    }
    .summary-card {
      flex: 1;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .summary-card .value { font-size: 18px; font-weight: 700; color: #1e293b; }
    .summary-card .label { font-size: 10px; color: #94a3b8; margin-top: 2px; }

    /* エラー */
    .error { color: #ef4444; font-size: 11px; margin-top: 4px; }

    /* ストップフォーム */
    .stop-section {
      border-top: 1px solid #f1f5f9;
      padding-top: 12px;
      margin-top: 8px;
    }

    /* フッター */
    .footer {
      padding: 8px 16px;
      border-top: 1px solid #f1f5f9;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer a { font-size: 11px; color: #6366f1; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .logout-btn {
      font-size: 11px;
      color: #94a3b8;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }
    .logout-btn:hover { color: #ef4444; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="popup.js"></script>
</body>
</html>
